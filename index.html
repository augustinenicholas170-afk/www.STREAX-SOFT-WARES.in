<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alvic Gym – QR Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    color: #f1f1f1;
    padding: 24px;
  }
  .logo { font-family:'Bebas Neue',sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: #f5c518; margin-bottom: 4px; }
  .sub  { font-size: 13px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 36px; }

  .qr-box {
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 0 0 5px #f5c518, 0 0 60px rgba(245,197,24,0.4);
    margin-bottom: 28px;
  }
  #qrcode img, #qrcode canvas { display:block; }

  .instruction {
    font-size: 22px; font-weight: 700; letter-spacing: 2px;
    color: #f5c518; text-align: center; margin-bottom: 8px;
  }
  .instruction2 {
    font-size: 14px; letter-spacing: 2px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; text-align: center;
  }
</style>
</head>
<body>

<div class="logo">ALVIC GYM</div>
<div class="sub">Fitness Centre · Trichy</div>

<div class="qr-box">
  <div id="qrcode"></div>
</div>

<div class="instruction">📱 Scan to Mark Attendance</div>
<div class="instruction2">Open camera → scan QR → enter your name</div>

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // ════════════════════════════════════════════════════════════
  // IMPORTANT: Replace this URL with the URL where you host
  // the form.html file. Examples:
  //   • GitHub Pages: https://yourusername.github.io/alvic/form.html
  //   • Any web host URL where form.html is uploaded
  // ════════════════════════════════════════════════════════════
  const FORM_URL = "https://YOUR_WEBSITE/form.html";

  new QRCode(document.getElementById("qrcode"), {
    text: FORM_URL,
    width: 250,
    height: 250,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
